name: pytest

on:
  push:
  pull_request:
    branches: [master]

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      QT_QPA_PLATFORM: offscreen
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libsndfile1 \
            libxkbcommon0 \
            libegl1 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-sync1 \
            libxcb-xfixes0 \
            libxcb-xinerama0 \
            libxcb-xkb1 \
            libdbus-1-3 \
            libfontconfig1 \
            libxrender1

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run ruff check
        run: ruff check src/lightconductor/

      - name: Run ruff format check
        run: ruff format --check src/lightconductor/

      - name: Run pytest
        run: pytest tests/ -q
